services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: stockshift-nginx
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - stockshift-network

  # backend:
  #   build: .
  #   container_name: stockshift-backend
  #   env_file:
  #     - .env
  #   environment:
  #     SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - stockshift-network
  #   expose:
  #     - "8080"
  #   restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stockshift-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockshift-network

  postgres:
    image: postgres:16-alpine
    container_name: stockshift-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-stockshift}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockshift-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stockshift-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stockshift.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - stockshift-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  stockshift-network:
    driver: bridge
