spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stockshift}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:9000,https://test.beatwave.fun}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  refresh-rotation-grace-period: ${JWT_REFRESH_ROTATION_GRACE_PERIOD:60000}
  cookie:
    secure: ${JWT_COOKIE_SECURE:false}
    same-site: ${JWT_COOKIE_SAME_SITE:Lax}
    domain: ${JWT_COOKIE_DOMAIN:}
    path: /
    http-only: true

logging:
  level:
    br.com.stockshift: DEBUG

storage:
  endpoint: ${STORAGE_ENDPOINT:}
  access-key: ${STORAGE_ACCESS_KEY:}
  secret-key: ${STORAGE_SECRET_KEY:}
  bucket-name: ${STORAGE_BUCKET_NAME:${STORAGE_BUCKET:stockshift}}
  region: ${STORAGE_REGION:auto}
  public-url: ${STORAGE_PUBLIC_URL:}

hcaptcha:
  secret-key: ${HCAPTCHA_SECRET_KEY:}
  enabled: false

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4.1-nano}

app:
  frontend-url: ${FRONTEND_URL:https://test.beatwave.fun}
  api-base-url: ${API_BASE_URL:https://test.beatwave.fun/stockshift}
