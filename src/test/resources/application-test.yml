# Test profile - datasource configured dynamically by BaseIntegrationTest via @DynamicPropertySource

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    clean-disabled: false
    validate-on-migrate: false
    out-of-order: true

jwt:
  secret: test-secret-key-for-integration-tests-minimum-256-bits
  access-expiration: 900000
  refresh-expiration: 604800000
  cookie:
    secure: false
    same-site: Lax
    domain:
    path: /
    http-only: true

cors:
  allowed-origins: http://localhost:3000

storage:
  endpoint: http://localhost:54321
  access-key: test-access-key
  secret-key: test-secret-key
  bucket-name: test-bucket
  region: us-east-1
  public-url: http://localhost:54321/test-bucket

hcaptcha:
  secret-key: test-hcaptcha-key

openai:
  api-key: test-api-key
  model: gpt-4o-mini

logging:
  level:
    root: WARN
    br.com.stockshift: DEBUG
    org.springframework.security: DEBUG

management:
  endpoint:
    health:
      show-details: always

stockshift:
  bot:
    api-key: test-bot-key
    tenant-id: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa
